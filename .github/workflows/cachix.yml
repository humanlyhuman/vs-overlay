name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: Flake checks (fast)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake show
        run: nix flake show --accept-flake-config
        
      - name: Flake check
        run: nix flake check --print-build-logs --accept-flake-config

  build:
    name: Build + Cachix
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: mycache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          
      - name: Build everything
        run: |
          nix build \
            --print-build-logs \
            --accept-flake-config \
            --no-link
  
  devshell:
    name: DevShell integration test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: mycache
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Evaluate dev shell
        run: nix develop .#everything --accept-flake-config -c true
